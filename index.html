<!DOCTYPE html>
<html>
<head>
  <title>AAA Pixel Platformer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(#0b1026, #000);
      font-family: Arial;
      overflow: hidden;
      color: white;
      text-align: center;
    }

    #hud {
      padding: 10px;
      font-size: 18px;
    }

    canvas {
      background: #111;
      display: block;
      margin: auto;
      border: 2px solid #00e5ff;
    }

    #controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
    }

    button {
      font-size: 20px;
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #00e5ff;
    }
  </style>
</head>

<body>

<div id="hud">
  Score: <span id="score">0</span>
</div>

<canvas id="game" width="320" height="480"></canvas>

<div id="controls">
  <button onclick="left=true">⬅️</button>
  <button onclick="jump()">⬆️</button>
  <button onclick="right=true">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let gravity = 0.4;

let left = false;
let right = false;

let cameraX = 0;

// PLAYER
let player = {
  x: 50,
  y: 300,
  w: 20,
  h: 20,
  dy: 0,
  onGround: false
};

// LEVEL
let platforms = [
  {x:0,y:420,w:2000,h:60},
  {x:200,y:350,w:100,h:10},
  {x:400,y:300,w:100,h:10},
  {x:650,y:250,w:100,h:10}
];

let coins = [
  {x:220,y:320,got:false},
  {x:420,y:270,got:false},
  {x:670,y:220,got:false}
];

let enemies = [
  {x:500,y:400}
];

// CONTROLS
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
  if(e.key==="ArrowUp") jump();
});

document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
});

// JUMP
function jump(){
  if(player.onGround){
    player.dy = -8;
    player.onGround = false;
  }
}

// GAME LOOP
function update(){

  // movement
  if(left) player.x -= 2;
  if(right) player.x += 2;

  // gravity
  player.dy += gravity;
  player.y += player.dy;

  player.onGround = false;

  // camera follow
  cameraX = player.x - 100;

  // platform collision
  platforms.forEach(p=>{
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      player.y = p.y - player.h;
      player.dy = 0;
      player.onGround = true;
    }
  });

  // coins
  coins.forEach(c=>{
    if(!c.got &&
      Math.abs(player.x-c.x)<15 &&
      Math.abs(player.y-c.y)<15
    ){
      c.got = true;
      score++;
      document.getElementById("score").innerText = score;
    }
  });

  draw();
  requestAnimationFrame(update);
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-cameraX,0);

  // player
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // platforms
  ctx.fillStyle="white";
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  // coins
  ctx.fillStyle="gold";
  coins.forEach(c=>{
    if(!c.got){
      ctx.beginPath();
      ctx.arc(c.x,c.y,5,0,Math.PI*2);
      ctx.fill();
    }
  });

  // enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>{
    e.x += Math.sin(Date.now()/500)*0.3;
    ctx.fillRect(e.x,e.y,20,20);
  });

  ctx.restore();
}

update();
</script>

</body>
</html>
