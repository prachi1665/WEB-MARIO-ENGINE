<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA Runner Game</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}

/* HUD */
#hud {
  position:fixed;
  top:0;
  width:100%;
  padding:8px;
  font-size:16px;
  z-index:10;
}

/* GAME */
#game {
  width:100%;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* PARALLAX LAYERS */
.layer {
  position:absolute;
  width:200%;
  height:100%;
  top:0;
  left:0;
}

#bg1 { background: linear-gradient(#0b1026,#000); z-index:0; }
#bg2 { background: url('https://i.imgur.com/3ZQ3Z3l.png'); opacity:0.2; z-index:1; }
#bg3 { background: url('https://i.imgur.com/8QfQ5QZ.png'); opacity:0.3; z-index:2; }

/* PLAYER */
#player {
  position:absolute;
  bottom:80px;
  left:80px;
  width:40px;
  height:40px;
  background:cyan;
  border-radius:10px;
  z-index:5;
  box-shadow:0 0 15px cyan;
}

/* OBSTACLES */
.obj {
  position:absolute;
  width:30px;
  height:30px;
  border-radius:50%;
  z-index:5;
}

.obstacle { background:red; }
.coin { background:gold; }
.animal { background:orange; }

/* POWER UPS */
.shield { background:deepskyblue; }
.magnet { background:lime; }

/* CONTROLS */
#controls {
  position:fixed;
  bottom:10px;
  width:100%;
}

button {
  font-size:20px;
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00e5ff;
}
</style>
</head>

<body>

<div id="hud">
Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
Shield: <span id="shield">OFF</span>
</div>

<div id="game">
  <div id="bg1" class="layer"></div>
  <div id="bg2" class="layer"></div>
  <div id="bg3" class="layer"></div>

  <div id="player"></div>
</div>

<div id="controls">
  <button onclick="left=true">⬅️</button>
  <button onclick="jump()">⬆️</button>
  <button onclick="right=true">➡️</button>
</div>

<script>
let game = document.getElementById("game");
let player = document.getElementById("player");

let score=0, level=1;
let speed=3;
let gravity=0.6;
let velY=0;
let ground=80;
let left=false, right=false;
let isJumping=false;

let shield=false;
let magnet=false;

let objects=[];

// SOUND ENGINE (no files needed)
function beep(freq){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

// PLAYER
let px=80, py=ground;

// JUMP
function jump(){
  if(!isJumping){
    velY=10;
    isJumping=true;
    beep(300);
  }
}

// SPAWN OBJECTS
function spawn(){
  let types=["obstacle","coin","animal","shield","magnet"];
  let type=types[Math.floor(Math.random()*types.length)];

  let obj=document.createElement("div");
  obj.className="obj "+type;
  obj.dataset.type=type;
  obj.style.left="100%";
  obj.style.bottom=ground+"px";

  game.appendChild(obj);
  objects.push(obj);
}
setInterval(spawn,1200);

// GAME LOOP
function loop(){

  // movement
  if(left) px-=5;
  if(right) px+=5;

  // gravity
  velY-=gravity;
  py+=velY;

  if(py<=ground){
    py=ground;
    velY=0;
    isJumping=false;
  }

  player.style.left=px+"px";
  player.style.bottom=py+"px";

  // parallax
  document.getElementById("bg2").style.left = -score*1+"px";
  document.getElementById("bg3").style.left = -score*2+"px";

  // speed increase
  speed += 0.002;

  // move objects
  objects.forEach((o,i)=>{
    let x=parseFloat(o.style.left);
    x-=speed;
    o.style.left=x+"px";

    // collision
    if(x<px+30 && x>px-30 && py<=ground+30){

      if(o.dataset.type==="coin"){
        score++;
        beep(600);
      }

      if(o.dataset.type==="shield"){
        shield=true;
        document.getElementById("shield").innerText="ON";
        setTimeout(()=>{shield=false;document.getElementById("shield").innerText="OFF";},5000);
      }

      if(o.dataset.type==="magnet"){
        magnet=true;
        setTimeout(()=>magnet=false,5000);
      }

      if(o.dataset.type==="animal" || o.dataset.type==="obstacle"){
        if(!shield){
          alert("💥 Game Over Score: "+score);
          location.reload();
        }
      }

      o.remove();
      objects.splice(i,1);
      score++;
      document.getElementById("score").innerText=score;
    }

    if(x<-50){
      o.remove();
      objects.splice(i,1);
    }
  });

  // level system
  if(score%10===0 && score>0){
    level=Math.floor(score/10)+1;
    document.getElementById("level").innerText=level;
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
