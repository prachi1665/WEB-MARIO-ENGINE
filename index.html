<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Run Survival</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(#1a2a6c, #000);
  color: white;
  text-align: center;
}

/* GAME AREA */
#game {
  width: 100%;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: #2b2b2b;
}

/* CHARACTER (REAL LOOK) */
#player {
  position: absolute;
  bottom: 60px;
  left: 80px;
  font-size: 35px;
  transition: transform 0.1s;
}

/* RUN ANIMATION */
.run {
  animation: runAnim 0.2s infinite alternate;
}
@keyframes runAnim {
  from { transform: translateY(0px) rotate(-5deg); }
  to { transform: translateY(-2px) rotate(5deg); }
}

/* OBJECTS */
.obj {
  position: absolute;
  font-size: 25px;
}

/* HUD */
#hud {
  position: fixed;
  top: 10px;
  width: 100%;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="hud">
Score: <span id="score">0</span>
</div>

<div id="game">
  <div id="player">🧍‍♂️</div>
  <div id="ground"></div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");

let score = 0;
let gravity = 0.6;
let velY = 0;
let ground = 60;

let px = 80;
let py = ground;
let isJumping = false;

let objects = [];

// START RUN ANIMATION
player.classList.add("run");

// CONTROLS
document.addEventListener("keydown", e=>{
  if(e.key===" " || e.key==="ArrowUp") jump();
});

document.addEventListener("touchstart", jump);

function jump(){
  if(!isJumping){
    velY = 12;
    isJumping = true;
  }
}

// SPAWN OBJECTS
function spawn(){
  let type = Math.random();

  let obj = document.createElement("div");
  obj.classList.add("obj");

  if(type < 0.5){
    obj.innerText = "🪙"; // coin
    obj.dataset.type = "coin";
  }
  else{
    obj.innerText = "🐺"; // animal (danger)
    obj.dataset.type = "animal";
  }

  obj.style.left = "100%";
  obj.style.bottom = ground + "px";

  game.appendChild(obj);
  objects.push(obj);
}

setInterval(spawn, 1200);

// GAME LOOP
function loop(){

  // GRAVITY
  velY -= gravity;
  py += velY;

  if(py <= ground){
    py = ground;
    velY = 0;
    isJumping = false;
  }

  player.style.bottom = py + "px";
  player.style.left = px + "px";

  // OBJECT MOVEMENT
  objects.forEach((o,i)=>{
    let x = parseFloat(o.style.left);
    x -= 5;
    o.style.left = x + "px";

    // COLLISION AREA
    if(
      x < px + 30 &&
      x > px - 30 &&
      py <= ground + 30
    ){

      if(o.dataset.type === "coin"){
        score++;
        document.getElementById("score").innerText = score;
        o.remove();
        objects.splice(i,1);
      }

      if(o.dataset.type === "animal"){
        alert("💥 BITTEN BY ANIMAL! Score: " + score);
        location.reload();
      }
    }

    if(x < -50){
      o.remove();
      objects.splice(i,1);
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
