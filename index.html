<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Runner PRO</title>

<style>
body {margin:0; overflow:hidden; font-family:Arial; background:#000; color:white;}

#game {width:100%; height:100vh; position:relative; overflow:hidden;}

/* SCREENS */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000;
  z-index:20;
}

/* PLAYER (SPRITE STYLE) */
#player {
  position:absolute;
  bottom:80px;
  left:80px;
  width:40px;
  height:40px;
  background:linear-gradient(cyan,blue);
  border-radius:10px;
  box-shadow:0 0 10px cyan;
}

/* RUN ANIMATION */
.run1 {transform: translateY(0);}
.run2 {transform: translateY(-3px);}

/* OBJECTS */
.obj {position:absolute; width:30px; height:30px; border-radius:50%;}
.coin {background:gold;}
.enemy {background:red;}
.power {background:lime;}

/* HUD */
#hud {
  position:fixed;
  top:5px;
  width:100%;
  text-align:center;
  z-index:10;
}

button {
  padding:10px 20px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00e5ff;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
  <h1>🌴 Jungle Runner PRO</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen" style="display:none;">
  <h1>💀 Game Over</h1>
  <button onclick="restart()">Restart</button>
</div>

<!-- HUD -->
<div id="hud">
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
❤️ <span id="health">3</span>
</div>

<div id="game">
  <div id="player"></div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");

let score=0, coins=0, health=3;
let speed=3;

let gravity=0.6, velY=0, ground=80;
let px=80, py=ground;

let isJumping=false;
let running=false;

let objects=[];

// SOUND
function sound(freq){
  let ctx=new AudioContext();
  let o=ctx.createOscillator();
  o.frequency.value=freq;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.1);
}

// START
function startGame(){
  document.getElementById("startScreen").style.display="none";
  running=true;
  loop();
}

// RESTART
function restart(){
  location.reload();
}

// JUMP
function jump(){
  if(!isJumping){
    velY=12;
    isJumping=true;
    sound(300);
  }
}
document.addEventListener("keydown",e=>{
  if(e.key===" "||e.key==="ArrowUp") jump();
});
document.addEventListener("touchstart", jump);

// SPAWN
function spawn(){
  if(!running) return;

  let types=["coin","enemy","power"];
  let t=types[Math.floor(Math.random()*types.length)];

  let obj=document.createElement("div");
  obj.className="obj "+t;
  obj.dataset.type=t;

  obj.style.left="100%";
  obj.style.bottom=ground+"px";

  game.appendChild(obj);
  objects.push(obj);
}
setInterval(spawn,900);

// LOOP
function loop(){
  if(!running) return;

  // ANIMATION
  player.className = (Date.now()%200<100) ? "run1" : "run2";

  // GRAVITY
  velY-=gravity;
  py+=velY;

  if(py<=ground){
    py=ground;
    velY=0;
    isJumping=false;
  }

  player.style.bottom=py+"px";

  speed+=0.002;

  // OBJECTS
  objects.forEach((o,i)=>{
    let x=parseFloat(o.style.left);
    x-=speed;
    o.style.left=x+"px";

    if(x<px+30 && x>px-30 && py<=ground+30){

      if(o.dataset.type==="coin"){
        score++; coins++;
        sound(600);
      }
      else if(o.dataset.type==="power"){
        health++;
      }
      else{
        health--;
        sound(100);
      }

      document.getElementById("score").innerText=score;
      document.getElementById("coins").innerText=coins;
      document.getElementById("health").innerText=health;

      o.remove();
      objects.splice(i,1);
    }

    if(x<-50){
      o.remove();
      objects.splice(i,1);
    }
  });

  // GAME OVER
  if(health<=0){
    running=false;
    document.getElementById("gameOverScreen").style.display="flex";
    return;
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
